name: Bug report
description: Report a sanitized problem with the skill or examples.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a problem. Do not paste tokens, credentials, raw agent transcripts with private data, private repository names, or internal absolute paths.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Describe the observable problem without private data.
      placeholder: Following the safe merge order, the child PR still auto-closed because...
    validations:
      required: true
  - type: dropdown
    id: symptom
    attributes:
      label: Symptom class
      options:
        - Child PR auto-closed when a base branch was deleted
        - Retarget refused (closed PR / edit --base failure)
        - Reopen refused on an auto-closed PR
        - Silent merge failure on a branch-protected repository
        - Bulk landing did not mark contained PRs MERGED
        - Conflict-resolution guidance issue (CONFLICTING after retarget)
        - Supersedes recovery issue
        - Mixed-stack splitting guidance issue
        - Documentation error or unclear guidance
        - Other sanitized symptom
    validations:
      required: true
  - type: textarea
    id: sanitized-checks
    attributes:
      label: Sanitized checks performed
      description: Summarize safe facts only. Use placeholder repo, branch, and PR identifiers.
      placeholder: |
        Merge mode used: --merge
        gh pr view state after merge: MERGED
        gh pr list --base <branch> --state open before deletion: empty
        Deletion method: git push origin --delete (CLI)
        Child PR state afterwards: CLOSED, mergedAt null
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: The child PR should have stayed open because it was retargeted before the deletion.
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      placeholder: The child PR closed and gh pr reopen was refused.
    validations:
      required: true
  - type: checkboxes
    id: safety
    attributes:
      label: Safety confirmation
      options:
        - label: I removed tokens, credentials, customer data, private repository names, and internal absolute paths.
          required: true
